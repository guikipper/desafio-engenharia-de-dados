services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sncr
      POSTGRES_PASSWORD: sncr
      POSTGRES_DB: sncr
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sncr"]
      interval: 5s
      timeout: 3s
      retries: 10

  pipeline:
    build: .
    command: python pipeline.py
    environment:
      DATABASE_URL: postgresql://sncr:sncr@db:5432/sncr
      SNCR_BASE_URL: https://data-engineer-challenge-production.up.railway.app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sncr:sncr@db:5432/sncr
    depends_on:
      db:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully

volumes:
  pgdata:
